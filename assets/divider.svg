<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 8" width="1200" height="8" preserveAspectRatio="none" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="sweep" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#22D3EE" stroke-opacity="0.18" stroke-width="1"/>
  <rect x="-220" y="3.4" width="220" height="1.2" fill="url(#sweep)">
    <animate attributeName="x" from="-220" to="1200" dur="7s" repeatCount="indefinite"/>
  </rect>
  <circle cy="4" r="2.4" fill="#22D3EE">
    <animate attributeName="cx" from="-10" to="1210" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="7s" repeatCount="indefinite"/>
  </circle>
</svg>
