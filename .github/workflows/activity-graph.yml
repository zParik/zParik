name: profile-graphs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    paths:
      - scripts/render-activity.mjs
      - scripts/render-languages.mjs
      - .github/workflows/activity-graph.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: render activity SVG
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USER:  ${{ github.repository_owner }}
          MONTHS:   "24"
        run: node scripts/render-activity.mjs

      - name: render languages SVG
        env:
          GH_TOKEN:  ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USER:   ${{ github.repository_owner }}
          TOP_LANGS: "8"
        run: node scripts/render-languages.mjs

      - name: commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-cumulative.svg assets/top-languages.svg
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(profile): refresh activity + languages graphs"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && exit 0
              echo "push attempt $i failed, retrying..."
              sleep $((i * 3))
            done
            echo "push failed after 5 attempts" && exit 1
          fi
